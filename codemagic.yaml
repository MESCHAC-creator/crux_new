workflows:
  android-release:
    name: Android Release
    instance_type: linux
    max_build_duration: 120
    environment:
      flutter: stable
      java: 21
      groups:
        - firebase_deploy
    scripts:
      - name: Clean
        script: |
          rm -f pubspec.lock
          rm -rf .dart_tool/ build/ android/.gradle/
          flutter clean

      - name: Setup
        script: |
          FLUTTER_SDK=$(which flutter | xargs readlink -f | sed 's|/bin/flutter||')
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties

      - name: Dependencies
        script: |
          set +e
          for i in {1..5}; do
            flutter pub get && exit 0
            sleep $((i * 20))
          done
          exit 1

      - name: Build APK
        script: |
          mkdir -p build/outputs
          flutter build apk --release
          cp $(find . -name "app-release.apk" ! -path "*/.pub-cache/*" | head -1) build/outputs/crux-release.apk

      - name: Build AAB
        script: |
          flutter build appbundle --release
          cp $(find . -name "app-release.aab" ! -path "*/.pub-cache/*" | head -1) build/outputs/crux-release.aab

    artifacts:
      - build/outputs/crux-release.apk
      - build/outputs/crux-release.aab

    publishing:
      email:
        recipients:
          - kouakouchristevann@gmail.com
        notify:
          success: true
          failure: true
