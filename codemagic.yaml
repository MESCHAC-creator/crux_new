workflows:

  # ═══════════════════════════════════════════════════════
  #  ANDROID RELEASE
  # ═══════════════════════════════════════════════════════
  android-release:
    name: Android Release - CRUX
    instance_type: linux
    max_build_duration: 120

    environment:
      flutter: 3.24.5
      java: 21
      groups:
        - firebase_deploy

    scripts:
      - name: Clean all caches and locks
        script: |
          set -e
          echo "=== Removing all lock files and caches ===" 
          rm -f pubspec.lock
          rm -rf .dart_tool/
          rm -rf build/
          rm -rf android/.gradle/
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/daemon/
          echo "✅ Caches cleaned"

      - name: Set up local.properties
        script: |
          FLUTTER_SDK=$(which flutter | xargs readlink -f | sed 's|/bin/flutter||')
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          flutter --version

      - name: Update Flutter and dependencies
        script: |
          set -e
          flutter clean
          flutter pub cache clean
          flutter pub get --verbose
          echo "✅ Flutter packages updated"

      - name: Pre-compile plugin dependencies
        script: |
          set -e
          echo "=== Pre-compiling plugin Android dependencies ==="
          cd android
          chmod +x gradlew
          ./gradlew downloadDependencies || true
          ./gradlew --refresh-dependencies || true
          cd ..
          echo "✅ Plugin dependencies pre-compiled"

      - name: Deploy Firestore rules (if FIREBASE_TOKEN is set)
        script:
