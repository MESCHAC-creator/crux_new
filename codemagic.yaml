workflows:

  # ═══════════════════════════════════════════════════════
  #  ANDROID RELEASE
  # ═══════════════════════════════════════════════════════
  android-release:
    name: Android Release - CRUX
    instance_type: linux
    max_build_duration: 120

    environment:
      flutter: 3.24.5
      java: 17
      groups:
        - firebase_deploy

    scripts:
      - name: Clean all caches and locks
        script: |
          set -e
          echo "=== Removing all lock files and caches ===" 
          rm -f pubspec.lock
          rm -rf .dart_tool/
          rm -rf build/
          rm -rf android/.gradle/
          rm -rf ~/.gradle/caches/
          rm -rf ~/.gradle/daemon/
          echo "✅ Caches cleaned"

      - name: Set up local.properties
        script: |
          FLUTTER_SDK=$(which flutter | xargs readlink -f | sed 's|/bin/flutter||')
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          flutter --version

      - name: Update Flutter and dependencies
        script: |
          set -e
          flutter clean
          flutter pub cache clean
          flutter pub get --verbose
          echo "✅ Flutter packages updated"

      - name: Pre-compile plugin dependencies
        script: |
          set -e
          echo "=== Pre-compiling plugin Android dependencies ==="
          cd android
          chmod +x gradlew
          ./gradlew downloadDependencies || true
          ./gradlew --refresh-dependencies || true
          cd ..
          echo "✅ Plugin dependencies pre-compiled"

      - name: Deploy Firestore rules (if FIREBASE_TOKEN is set)
        script: |
          if [ -n "$FIREBASE_TOKEN" ]; then
            npm install -g firebase-tools --silent
            firebase deploy --only firestore:rules \
              --project crux-8aa85 \
              --token "$FIREBASE_TOKEN" \
              --non-interactive
            echo "✅ Règles Firestore déployées"
          else
            echo "⏭️  FIREBASE_TOKEN absent — build OK"
          fi

      - name: Patch flutter_webrtc (remove V1 embedding)
        script: |
          python3 - <<'PYEOF'
          import re, glob, os
          pattern = os.path.expanduser(
              '~/.pub-cache/hosted/pub.dev/flutter_webrtc*/android/src/main/java/com/cloudwebrtc/webrtc/FlutterWebRTCPlugin.java'
          )
          files = glob.glob(pattern)
          if not files:
              print('flutter_webrtc plugin not found, skipping patch')
              exit(0)
          for path in files:
              with open(path, 'r') as f:
                  content = f.read()
              original = content
              content = re.sub(
                  r'import io\.flutter\.plugin\.common\.PluginRegistry\.Registrar;\n',
                  '', content)
              content = re.sub(
                  r'\n[ \t]+public static void registerWith\(Registrar[^)]*\) \{[^}]*\}',
                  '', content)
              if content != original:
                  with open(path, 'w') as f:
                      f.write(content)
                  print(f'Patched: {path}')
              else:
                  print(f'No changes needed: {path}')
          PYEOF

      - name: Patch GeneratedPluginRegistrant (add Log import)
        script: |
          set -e
          REGISTRANT="android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java"
          if [ -f "$REGISTRANT" ]; then
            # Add missing Log import if not present
            if ! grep -q "import android.util.Log;" "$REGISTRANT"; then
              sed -i '1s/^/import android.util.Log;\n/' "$REGISTRANT"
              echo "✅ Log import added to GeneratedPluginRegistrant"
            fi
          else
            echo "⚠️  GeneratedPluginRegistrant.java not found yet (will be generated)"
          fi

      - name: Install Gradle init script to fix afterEvaluate
        script: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/flutter-ae-fix.gradle << 'INIT_EOF'
          gradle.beforeProject { project ->
              project.metaClass.afterEvaluate = { Closure action ->
                  def p = delegate
                  if (p.state.executed) {
                      action.delegate = p
                      action.resolveStrategy = Closure.DELEGATE_FIRST
                      action()
                  } else {
                      def javaClass = p.class
                      while (javaClass != null && javaClass != Object.class) {
                          try {
                              def m = javaClass.getDeclaredMethod('afterEvaluate', [groovy.lang.Closure] as Class[])
                              m.accessible = true
                              m.invoke(p, action)
                              return
                          } catch (NoSuchMethodException ignored) {
                              javaClass = javaClass.superclass
                          }
                      }
                      p.afterEvaluate(new org.gradle.api.Action<org.gradle.api.Project>() {
                          void execute(org.gradle.api.Project proj) { action.call() }
                      })
                  }
              }
          }
          INIT_EOF
          echo "✅ Gradle init script installed"

      - name: Prepare Gradle wrapper
        script: |
          set -e
          if [ -f android/gradlew ]; then
            chmod +x android/gradlew
          else
            echo "❌ android/gradlew missing"
            exit 1
          fi
          if [ ! -f android/gradle/wrapper/gradle-wrapper.jar ]; then
            echo "❌ gradle-wrapper.jar missing"
            exit 1
          fi
          echo "✅ Gradle wrapper ready"

      - name: Generate app icons
        script: dart run flutter_launcher_icons -f flutter_launcher_icons_android.yaml

      - name: Build APK and AAB
        script: |
          set -e
          mkdir -p build/outputs

          echo "=== FLUTTER BUILD APK (release) ==="
          flutter build apk --release --no-tree-shake-icons --verbose 2>&1 | tail -500

          APK=$(find build/app/outputs/flutter-apk -name "app-release.apk" 2>/dev/null | head -1)
          [ -z "$APK" ] && APK=$(find build/app/outputs/apk -name "app-release.apk" 2>/dev/null | head -1)
          [ -z "$APK" ] && APK=$(find . -name "app-release.apk" ! -path "*/.pub-cache/*" ! -path "*/debug/*" 2>/dev/null | head -1)

          if [ -z "$APK" ]; then
            echo "❌ APK not found"
            find build/app/outputs 2>/dev/null || echo "(empty)"
            exit 1
          fi
          cp "$APK" build/outputs/crux-release.apk
          echo "✅ APK: $(du -sh build/outputs/crux-release.apk | cut -f1)"

          echo "=== FLUTTER BUILD AAB (release) ==="
          flutter build appbundle --release --no-tree-shake-icons --verbose 2>&1 | tail -500

          AAB=$(find build/app/outputs/bundle -name "app-release.aab" 2>/dev/null | head -1)
          [ -z "$AAB" ] && AAB=$(find . -name "app-release.aab" ! -path "*/.pub-cache/*" 2>/dev/null | head -1)

          if [ -z "$AAB" ]; then
            echo "❌ AAB not found"
            find build/app/outputs 2>/dev/null || echo "(empty)"
            exit 1
          fi
          cp "$AAB" build/outputs/crux-release.aab
          echo "✅ AAB: $(du -sh build/outputs/crux-release.aab | cut -f1)"

    artifacts:
      - build/outputs/crux-release.apk
      - build/outputs/crux-release.aab

    publishing:
      email:
        recipients:
          - kouakouchristevann@gmail.com
        notify:
          success: true
          failure: true

  # ═══════════════════════════════════════════════════════
  #  iOS RELEASE
  # ═══════════════════════════════════════════════════════
  ios-release:
    name: iOS Release - CRUX
    instance_type: mac_mini_m2
    max_build_duration: 120

    integrations:
      app_store_connect: codemagic_api_key

    environment:
      flutter: 3.24.5
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.example.crux
      groups:
        - firebase_ios
        - firebase_deploy

    scripts:
      - name: Clean all caches
        script: |
          set -e
          rm -f pubspec.lock
          rm -rf .dart_tool/
          rm -rf build/
          flutter clean
          echo "✅ Caches cleaned"

      - name: Generate iOS project files
        script: |
          set -e
          if [ ! -d "ios" ]; then
            flutter create --platforms ios --org com.example --project-name crux .
            echo "✅ iOS folder generated"
          else
            echo "✅ iOS folder already exists"
          fi
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          if [ -f "$PBXPROJ" ]; then
            sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*/PRODUCT_BUNDLE_IDENTIFIER = com.example.crux/g' "$PBXPROJ" || \
            sed -i 's/PRODUCT_BUNDLE_IDENTIFIER = [^;]*/PRODUCT_BUNDLE_IDENTIFIER = com.example.crux/g' "$PBXPROJ"
            echo "✅ Bundle ID patché"
          fi

      - name: Inject GoogleService-Info.plist
        script: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/Runner/GoogleService-Info.plist
            echo "✅ GoogleService-Info.plist injecté"
          else
            echo "⚠️  GOOGLE_SERVICE_INFO_PLIST absent"
          fi

      - name: Patch Info.plist permissions
        script: |
          set -e
          PLIST="ios/Runner/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'CRUX needs the camera for video conferences'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'CRUX needs the camera for video conferences'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 'CRUX needs the microphone for calls'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSMicrophoneUsageDescription 'CRUX needs the microphone for calls'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string 'CRUX'" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName 'CRUX'" "$PLIST"
          echo "✅ Info.plist patché"

      - name: Get Flutter packages
        script: flutter pub get --verbose

      - name: Deploy Firestore rules (if FIREBASE_TOKEN is set)
        script: |
          if [ -n "$FIREBASE_TOKEN" ]; then
            npm install -g firebase-tools --silent
            firebase deploy --only firestore:rules \
              --project crux-8aa85 \
              --token "$FIREBASE_TOKEN" \
              --non-interactive
            echo "✅ Firestore rules deployed"
          else
            echo "⏭️  FIREBASE_TOKEN absent"
          fi

      - name: Generate app icons
        script: dart run flutter_launcher_icons -f flutter_launcher_icons_ios.yaml

      - name: Install CocoaPods
        script: |
          set -e
          cd ios
          pod repo update
          pod install
          echo "✅ CocoaPods installed"

      - name: Build iOS IPA
        script: |
          set -e
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
          echo "✅ IPA built"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - kouakouchristevann@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
