name: Build APK

on:
  push:
    branches: [ main, schac-claude, claude/kind-babbage-vqDxq ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Write local.properties
        run: |
          FLUTTER_SDK="$(dirname $(dirname $(which flutter)))"
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Gradle wrapper
        run: |
          if [ -f android/gradlew ]; then
            chmod +x android/gradlew
          fi

      - name: Patch flutter_webrtc (remove V1 embedding)
        run: |
          python3 - <<'PYEOF'
          import re, glob, os
          pattern = os.path.expanduser(
              '~/.pub-cache/hosted/pub.dev/flutter_webrtc*/android/src/main/java/com/cloudwebrtc/webrtc/FlutterWebRTCPlugin.java'
          )
          files = glob.glob(pattern)
          if not files:
              print('flutter_webrtc plugin not found, skipping patch')
              exit(0)
          for path in files:
              with open(path, 'r') as f:
                  content = f.read()
              original = content
              content = re.sub(
                  r'import io\.flutter\.plugin\.common\.PluginRegistry\.Registrar;\n',
                  '',
                  content
              )
              content = re.sub(
                  r'\n[ \t]+public static void registerWith\(Registrar[^)]*\) \{[^}]*\}',
                  '',
                  content
              )
              if content != original:
                  with open(path, 'w') as f:
                      f.write(content)
                  print(f'Patched: {path}')
              else:
                  print(f'No changes needed: {path}')
          PYEOF

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Build release AAB
        run: flutter build appbundle --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: crux-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: crux-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Create GitHub Release (on push to main)
        if: github.ref == 'refs/heads/main' && success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: CRUX v${{ github.run_number }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-web:
    name: Deploy Web Client to Firebase Hosting
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/schac-claude'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        continue-on-error: true
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: crux-8aa85
          channelId: live
