<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Connexion — CRUX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/crux.css"/>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-logo" style="text-decoration:none;color:inherit">
    <div class="mark">📹</div>CRUX
  </a>
  <div class="nav-actions">
    <a href="/signup" class="btn btn-primary btn-sm" style="text-decoration:none">S'inscrire</a>
  </div>
</nav>

<div class="page-center">
  <div class="card">
    <div class="logo-mark">📹</div>
    <div class="logo-text">CRUX</div>
    <div class="logo-sub">Connexion à votre compte</div>

    <div id="errMsg" class="err-msg"></div>
    <div id="infoMsg" class="info-msg"></div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="votre@email.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"/>
    </div>

    <button class="btn btn-primary" id="loginBtn" onclick="login()">Se connecter</button>

    <div class="divider">ou</div>

    <button class="btn btn-outline" id="googleBtn" onclick="loginGoogle()" style="display:flex;align-items:center;justify-content:center;gap:10px">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continuer avec Google
    </button>

    <div style="text-align:center;margin-top:20px;font-size:13px;color:rgba(255,255,255,0.45)">
      Pas encore de compte ? <a href="/signup">S'inscrire</a>
    </div>
    <div style="text-align:center;margin-top:8px;font-size:13px">
      <a href="#" onclick="forgotPassword()" style="color:rgba(255,255,255,0.45)">Mot de passe oublié ?</a>
    </div>
  </div>
</div>

<div id="toast"></div>
<script type="module">
  import { initializeApp }         from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail, onAuthStateChanged }
                                   from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { FIREBASE_CONFIG, toast } from '/js/firebase.js';

  const app  = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);

  // Redirect if already signed in
  onAuthStateChanged(auth, user => {
    if (user && !user.isAnonymous) {
      const next = new URLSearchParams(location.search).get('next') || '/app';
      window.location.href = next;
    }
  });

  function showErr(msg) {
    const el = document.getElementById('errMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('infoMsg').style.display = 'none';
  }
  function showInfo(msg) {
    const el = document.getElementById('infoMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('errMsg').style.display = 'none';
  }
  function setLoading(id, loading, label) {
    const btn = document.getElementById(id);
    btn.disabled = loading;
    btn.innerHTML = loading ? `<span class="spinner"></span>${label}` : label;
  }

  window.login = async function() {
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;
    if (!email || !pass) { showErr('Remplissez tous les champs.'); return; }
    setLoading('loginBtn', true, 'Connexion...');
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      // onAuthStateChanged will redirect
    } catch (e) {
      const msgs = {
        'auth/user-not-found': 'Aucun compte avec cet email.',
        'auth/wrong-password': 'Mot de passe incorrect.',
        'auth/invalid-email': 'Email invalide.',
        'auth/too-many-requests': 'Trop de tentatives. Réessayez plus tard.',
      };
      showErr(msgs[e.code] || 'Erreur de connexion.');
      setLoading('loginBtn', false, 'Se connecter');
    }
  };

  window.loginGoogle = async function() {
    setLoading('googleBtn', true, 'Connexion...');
    try {
      const provider = new GoogleAuthProvider();
      await signInWithPopup(auth, provider);
    } catch (e) {
      if (e.code !== 'auth/popup-closed-by-user') showErr('Erreur Google Sign-In.');
      setLoading('googleBtn', false, '<svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continuer avec Google');
    }
  };

  window.forgotPassword = async function() {
    const email = document.getElementById('email').value.trim();
    if (!email) { showErr('Entrez votre email d\'abord.'); return; }
    try {
      await sendPasswordResetEmail(auth, email);
      showInfo('Email de réinitialisation envoyé !');
    } catch (e) {
      showErr('Erreur. Vérifiez l\'email.');
    }
  };
</script>
</body>
</html>
