<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRUX — Rejoindre la réunion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: #0A0A14; color: #fff; min-height: 100vh; }

    /* ── Lobby ── */
    #lobby { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { background: #12121E; border-radius: 20px; padding: 40px 32px; max-width: 440px; width: 100%; box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
    .logo { width: 64px; height: 64px; border-radius: 18px; background: linear-gradient(135deg,#B71C1C,#6A1B9A); display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 18px; }
    h1 { font-size: 22px; font-weight: 700; text-align: center; }
    .meeting-id { color: rgba(255,255,255,0.35); font-size: 13px; text-align: center; letter-spacing: 1px; margin-bottom: 28px; }
    label { display: block; font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 8px; }
    input[type="text"], input[type="password"] {
      width: 100%; background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 13px 16px; font-family: 'Poppins',sans-serif; font-size: 15px;
      color: #fff; outline: none; margin-bottom: 16px; transition: border-color .2s;
    }
    input:focus { border-color: #E74C3C; }
    input::placeholder { color: rgba(255,255,255,0.3); }
    .btn { display:block; width:100%; padding:15px; background:#E74C3C; border:none; border-radius:12px; color:#fff; font-family:'Poppins',sans-serif; font-size:16px; font-weight:600; cursor:pointer; transition:opacity .2s; }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    .btn:not(:disabled):hover { opacity:.88; }
    .app-hint { display:flex; align-items:center; justify-content:center; gap:10px; margin-top:18px; padding:13px; border:1px solid rgba(255,255,255,0.1); border-radius:10px; font-size:13px; color:rgba(255,255,255,0.5); text-decoration:none; }
    .app-hint:hover { border-color:rgba(255,255,255,0.25); }
    .error { color:#E74C3C; font-size:13px; margin:-8px 0 12px; }
    .spinner { display:inline-block; width:20px; height:20px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:8px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .badge { display:inline-flex; align-items:center; gap:6px; background:rgba(46,204,113,0.15); border:1px solid rgba(46,204,113,0.3); color:#2ecc71; border-radius:20px; padding:4px 12px; font-size:12px; margin-bottom:16px; }

    /* ── Call UI ── */
    #callUI { display:none; flex-direction:column; height:100vh; }
    .videos { flex:1; display:grid; grid-template-columns:1fr 1fr; gap:4px; background:#000; overflow:hidden; }
    .videos.solo { grid-template-columns:1fr; }
    video { width:100%; height:100%; object-fit:cover; background:#0d0d1a; display:block; }
    #localVideo { transform:scaleX(-1); }
    .video-wrap { position:relative; }
    .video-label { position:absolute; bottom:8px; left:10px; font-size:12px; background:rgba(0,0,0,0.55); padding:2px 8px; border-radius:6px; }
    .controls { background:#12121E; display:flex; align-items:center; justify-content:center; gap:12px; padding:16px; flex-shrink:0; }
    .ctrl-btn { width:52px; height:52px; border-radius:50%; border:none; background:rgba(255,255,255,0.1); color:#fff; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .2s; }
    .ctrl-btn:hover { background:rgba(255,255,255,0.18); }
    .ctrl-btn.off { background:#E74C3C; }
    .ctrl-btn.end { background:#c0392b; width:60px; height:60px; font-size:22px; }
    .status-bar { background:rgba(0,0,0,0.6); text-align:center; padding:6px; font-size:12px; color:rgba(255,255,255,0.55); }
    #connStatus { font-weight:600; }

    /* ── Not found ── */
    #notFound { display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:24px; }

    /* ── Chat ── */
    #chatPanel { display:none; position:fixed; bottom:90px; right:12px; width:280px; background:#1a1a2e; border-radius:14px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.5); z-index:100; }
  </style>
</head>
<body>

<!-- Lobby -->
<div id="lobby">
  <div class="card">
    <div class="logo">📹</div>
    <h1 id="meetingTitle">Réunion CRUX</h1>
    <p class="meeting-id" id="meetingCode">Code : …</p>

    <div id="webBadge" style="text-align:center">
      <span class="badge">🌐 Connexion directe depuis votre navigateur</span>
    </div>

    <label for="nameInput">Votre prénom ou surnom</label>
    <input type="text" id="nameInput" placeholder="Ex: Marie Dupont" maxlength="40" />

    <div id="passcodeRow" style="display:none">
      <label for="passcodeInput">Code d'accès</label>
      <input type="password" id="passcodeInput" placeholder="••••••" maxlength="10" />
    </div>

    <p class="error" id="lobbyErr" style="display:none"></p>

    <button class="btn" id="joinBtn" onclick="startJoin()">
      Rejoindre depuis le navigateur →
    </button>

    <a id="appLink" class="app-hint" href="#" onclick="openApp(event)">
      📱 Vous avez l'application ? Ouvrir dans CRUX
    </a>
  </div>
</div>

<!-- Not found -->
<div id="notFound">
  <div class="card" style="text-align:center">
    <div style="font-size:52px;margin-bottom:16px">🔗</div>
    <h1 style="margin-bottom:8px">Réunion introuvable</h1>
    <p style="color:rgba(255,255,255,0.45);margin-bottom:24px">Ce code n'existe pas ou a expiré.</p>
    <a href="/" class="btn" style="text-decoration:none;display:inline-block;padding:14px 32px;width:auto">Retour</a>
  </div>
</div>

<!-- Active call -->
<div id="callUI">
  <div class="status-bar">
    CRUX Web — <span id="connStatus">Connexion…</span>
    &nbsp;|&nbsp; <span id="peerName">En attente de l'autre participant…</span>
  </div>
  <div class="videos solo" id="videoGrid">
    <div class="video-wrap">
      <video id="localVideo" autoplay muted playsinline></video>
      <span class="video-label" id="localLabel">Vous</span>
    </div>
    <div class="video-wrap" id="remoteWrap" style="display:none">
      <video id="remoteVideo" autoplay playsinline></video>
      <span class="video-label" id="remoteLabel">Participant</span>
    </div>
  </div>
  <div class="controls">
    <button class="ctrl-btn" id="micBtn" onclick="toggleMic()" title="Micro">🎤</button>
    <button class="ctrl-btn" id="camBtn" onclick="toggleCam()" title="Caméra">📷</button>
    <button class="ctrl-btn" id="chatBtn" onclick="toggleChat()" title="Chat">💬</button>
    <button class="ctrl-btn end" onclick="endCall()" title="Quitter">📵</button>
  </div>
  <div id="chatPanel">
    <div style="padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.08);font-weight:600;font-size:14px">💬 Chat</div>
    <div id="chatMessages" style="height:200px;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:6px;font-size:13px"></div>
    <div style="display:flex;gap:8px;padding:8px 10px;border-top:1px solid rgba(255,255,255,0.08)">
      <input type="text" id="chatInput" placeholder="Message…" style="flex:1;font-size:13px;padding:8px;margin-bottom:0" onkeydown="chatKey(event)" />
      <button onclick="sendChat()" style="background:#E74C3C;border:none;border-radius:8px;padding:8px 12px;color:#fff;cursor:pointer;font-size:13px">↑</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {
  getFirestore, doc, getDoc, setDoc, updateDoc, addDoc, onSnapshot,
  collection, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ── Firebase ─────────────────────────────────────────────────────
const app = initializeApp({
  apiKey:            'AIzaSyDfVNAL2cV47g9WHPtXsaE8_4pWFpy3-Ls',
  authDomain:        'crux-8aa85.firebaseapp.com',
  projectId:         'crux-8aa85',
  storageBucket:     'crux-8aa85.appspot.com',
  messagingSenderId: '667181830171',
  appId:             '1:667181830171:android:85399beb4fc1d087c4e8be',
});
const auth = getAuth(app);
const db   = getFirestore(app);

// ── ICE (mirrors Flutter app) ────────────────────────────────────
const ICE_CONFIG = {
  iceServers: [
    { urls: ['stun:stun.l.google.com:19302','stun:stun1.l.google.com:19302',
             'stun:stun2.l.google.com:19302','stun:stun.cloudflare.com:3478',
             'stun:stun.mozilla.com:3478'] },
    { urls: ['turn:openrelay.metered.ca:80','turn:openrelay.metered.ca:443',
             'turn:openrelay.metered.ca:443?transport=tcp','turns:openrelay.metered.ca:443'],
      username: 'openrelayproject', credential: 'openrelayproject' },
  ],
  sdpSemantics: 'unified-plan',
  iceTransportPolicy: 'all',
};

// ── State ────────────────────────────────────────────────────────
let meetingId = '';
let myName    = '';
let myUid     = '';
let localStream = null;
let pc = null;
let micOn = true, camOn = true;
let chatUnsub = null, roomUnsub = null;
let candidateUnsubs = [];

// ── Helpers ──────────────────────────────────────────────────────
function getMeetingIdFromPath() {
  const segs = location.pathname.split('/').filter(Boolean);
  if (segs.length >= 2 && segs[0] === 'join') return segs[1].toUpperCase();
  return (new URLSearchParams(location.search).get('id') || '').toUpperCase();
}
function showErr(msg) {
  const el = document.getElementById('lobbyErr');
  el.textContent = msg; el.style.display = 'block';
}
function hideErr() { document.getElementById('lobbyErr').style.display = 'none'; }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Init ─────────────────────────────────────────────────────────
async function init() {
  meetingId = getMeetingIdFromPath();
  if (!meetingId) { showNotFound(); return; }

  document.getElementById('meetingCode').textContent = 'Code : ' + meetingId;
  document.getElementById('appLink').dataset.meetingId = meetingId;

  // Anonymous sign-in FIRST so Firestore rules (require auth != null) pass
  try {
    const cred = await signInAnonymously(auth);
    myUid = cred.user.uid;
  } catch (e) {
    showErr('Erreur de connexion réseau. Vérifiez votre connexion et rechargez.');
    return;
  }

  // Now read meeting info
  try {
    const snap = await getDoc(doc(db, 'meetings', meetingId));
    if (!snap.exists()) { showNotFound(); return; }
    const data = snap.data();
    document.getElementById('meetingTitle').textContent = data.title || 'Réunion CRUX';
    document.title = 'CRUX — ' + (data.title || 'Réunion');
    if (data.passcode && data.passcode.length > 0) {
      document.getElementById('passcodeRow').style.display = 'block';
    }
  } catch (e) {
    showErr('Impossible de charger la réunion : ' + e.message);
  }
}

function showNotFound() {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('notFound').style.display = 'flex';
}

// ── "Open in app" button ─────────────────────────────────────────
window.openApp = function(e) {
  e.preventDefault();
  const mid = document.getElementById('appLink').dataset.meetingId || meetingId;
  // Try to open the native app. If not installed, the browser stays on page.
  window.location.href = 'crux://join/' + mid;
};

// ── Join ─────────────────────────────────────────────────────────
window.startJoin = async function() {
  hideErr();
  const name = document.getElementById('nameInput').value.trim();
  if (!name) { showErr('Entrez votre prénom pour continuer.'); return; }

  if (document.getElementById('passcodeRow').style.display !== 'none') {
    const entered = document.getElementById('passcodeInput').value.trim();
    try {
      const snap = await getDoc(doc(db, 'meetings', meetingId));
      const expected = snap.data()?.passcode || '';
      if (entered !== expected) { showErr("Code d'accès incorrect."); return; }
    } catch (_) {}
  }

  myName = name;
  // Update anonymous user display name
  try { await auth.currentUser?.updateProfile?.({ displayName: name }); } catch (_) {}

  const btn = document.getElementById('joinBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Démarrage de la caméra…';

  try {
    await startCall();
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Rejoindre depuis le navigateur →';
    const msg = e.name === 'NotAllowedError'
      ? 'Accès refusé à la caméra/micro. Autorisez les permissions dans votre navigateur.'
      : 'Erreur : ' + e.message;
    showErr(msg);
  }
};

// ── Call ─────────────────────────────────────────────────────────
async function startCall() {
  localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  document.getElementById('localVideo').srcObject = localStream;
  document.getElementById('localLabel').textContent = myName + ' (vous)';

  document.getElementById('lobby').style.display = 'none';
  document.getElementById('callUI').style.display = 'flex';

  pc = new RTCPeerConnection(ICE_CONFIG);
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.ontrack = e => {
    const rv = document.getElementById('remoteVideo');
    if (rv.srcObject !== e.streams[0]) {
      rv.srcObject = e.streams[0];
      document.getElementById('remoteWrap').style.display = '';
      document.getElementById('videoGrid').classList.remove('solo');
    }
  };

  pc.oniceconnectionstatechange = () => {
    const s = pc.iceConnectionState;
    const el = document.getElementById('connStatus');
    const map = { checking:'Connexion…', connected:'Connecté ✓', completed:'Connecté ✓',
                  disconnected:'Déconnecté', failed:'Échec', closed:'Fermé' };
    el.textContent = map[s] || s;
    el.style.color = (s === 'connected' || s === 'completed') ? '#2ecc71'
                   : (s === 'failed' || s === 'disconnected') ? '#E74C3C' : '';
  };

  const docId = 'room_' + meetingId.replace(/[^a-zA-Z0-9]/g, '_');
  const roomRef = doc(db, 'webrtc_rooms', docId);
  const roomSnap = await getDoc(roomRef);

  if (!roomSnap.exists() || !roomSnap.data()?.offer) {
    await doOffer(roomRef, docId);
  } else {
    await doAnswer(roomSnap, roomRef, docId);
  }

  // Write presence (uid matches Firestore rule: request.auth.uid == userId)
  await setDoc(
    doc(db, 'meetings', meetingId, 'presence', myUid),
    { userId: myUid, name: myName, micOn: true, cameraOn: true,
      timestamp: serverTimestamp(), isWeb: true },
    { merge: true }
  ).catch(() => {});

  listenChat();
}

async function doOffer(roomRef, docId) {
  pc.onicecandidate = async e => {
    if (e.candidate) {
      await addDoc(collection(db, 'webrtc_rooms', docId, 'offerCandidates'), {
        candidate: e.candidate.candidate,
        sdpMid: e.candidate.sdpMid,
        sdpMLineIndex: e.candidate.sdpMLineIndex,
      }).catch(() => {});
    }
  };
  const offer = await pc.createOffer({ offerToReceiveVideo:1, offerToReceiveAudio:1 });
  await pc.setLocalDescription(offer);
  await setDoc(roomRef, { offer: { type: offer.type, sdp: offer.sdp } });

  roomUnsub = onSnapshot(roomRef, snap => {
    const data = snap.data();
    if (data?.answer && !pc.currentRemoteDescription) {
      pc.setRemoteDescription(new RTCSessionDescription({ type: data.answer.type, sdp: data.answer.sdp }));
      document.getElementById('peerName').textContent = 'Connecté';
    }
  });
  candidateUnsubs.push(onSnapshot(collection(db, 'webrtc_rooms', docId, 'answerCandidates'), snap => {
    snap.docChanges().forEach(ch => {
      if (ch.type === 'added') {
        const d = ch.doc.data();
        pc.addIceCandidate(new RTCIceCandidate({ candidate:d.candidate, sdpMid:d.sdpMid, sdpMLineIndex:d.sdpMLineIndex })).catch(()=>{});
      }
    });
  }));
}

async function doAnswer(roomSnap, roomRef, docId) {
  pc.onicecandidate = async e => {
    if (e.candidate) {
      await addDoc(collection(db, 'webrtc_rooms', docId, 'answerCandidates'), {
        candidate: e.candidate.candidate,
        sdpMid: e.candidate.sdpMid,
        sdpMLineIndex: e.candidate.sdpMLineIndex,
      }).catch(() => {});
    }
  };
  const offerData = roomSnap.data().offer;
  await pc.setRemoteDescription(new RTCSessionDescription({ type:offerData.type, sdp:offerData.sdp }));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await updateDoc(roomRef, { answer: { type: answer.type, sdp: answer.sdp } });

  candidateUnsubs.push(onSnapshot(collection(db, 'webrtc_rooms', docId, 'offerCandidates'), snap => {
    snap.docChanges().forEach(ch => {
      if (ch.type === 'added') {
        const d = ch.doc.data();
        pc.addIceCandidate(new RTCIceCandidate({ candidate:d.candidate, sdpMid:d.sdpMid, sdpMLineIndex:d.sdpMLineIndex })).catch(()=>{});
      }
    });
  }));
  document.getElementById('peerName').textContent = "Connecté à l'hôte";
}

// ── Controls ─────────────────────────────────────────────────────
window.toggleMic = function() {
  micOn = !micOn;
  localStream?.getAudioTracks().forEach(t => t.enabled = micOn);
  document.getElementById('micBtn').classList.toggle('off', !micOn);
  document.getElementById('micBtn').textContent = micOn ? '🎤' : '🔇';
};
window.toggleCam = function() {
  camOn = !camOn;
  localStream?.getVideoTracks().forEach(t => t.enabled = camOn);
  document.getElementById('camBtn').classList.toggle('off', !camOn);
  document.getElementById('camBtn').textContent = camOn ? '📷' : '🚫';
};
window.toggleChat = function() {
  const p = document.getElementById('chatPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
};
window.endCall = function() { cleanup(); window.location.href = '/'; };

function cleanup() {
  pc?.close();
  localStream?.getTracks().forEach(t => t.stop());
  roomUnsub?.(); candidateUnsubs.forEach(u => u()); chatUnsub?.();
}
window.addEventListener('beforeunload', cleanup);

// ── Chat ─────────────────────────────────────────────────────────
function listenChat() {
  chatUnsub = onSnapshot(collection(db, 'meetings', meetingId, 'chat'), snap => {
    const box = document.getElementById('chatMessages');
    snap.docChanges().forEach(ch => {
      if (ch.type === 'added') {
        const d = ch.doc.data();
        const div = document.createElement('div');
        div.style.cssText = 'background:rgba(255,255,255,0.06);border-radius:8px;padding:6px 10px';
        div.innerHTML = `<span style="color:#E74C3C;font-weight:600">${esc(d.sender||'Anonyme')}</span><br/>${esc(d.text||'')}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
      }
    });
  });
}
window.sendChat = async function() {
  const inp = document.getElementById('chatInput');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  await addDoc(collection(db, 'meetings', meetingId, 'chat'), {
    sender: myName, senderId: myUid,
    text, timestamp: serverTimestamp(), isWeb: true,
  }).catch(() => {});
};
window.chatKey = function(e) { if (e.key === 'Enter') window.sendChat(); };

// ── Boot ─────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
