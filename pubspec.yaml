name: crux
description: Application Flutter
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.1
  shared_preferences: ^2.2.2
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0
  provider: ^6.1.2
  logger: ^2.4.0
  app_links: ^6.3.2
  google_sign_in: ^6.2.1
  speech_to_text: ^7.0.0
  url_launcher: ^6.2.5
  share_plus: ^9.0.0
  flutter_webrtc: ^0.11.0
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0
  livekit_client: ^2.2.0
  uuid: ^4.4.0
  flutter_local_notifications: ^17.1.2
  flutter_secure_storage: ^9.2.2
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 24

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png
