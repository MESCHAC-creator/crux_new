name: crux
description: "CRUX - Premium Video Conferencing App"
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.5.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.2.3
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.2
  firebase_messaging: ^15.2.1
  provider: ^6.1.2
  logger: ^2.4.0
  app_links: ^6.3.2
  google_sign_in: ^6.2.1
  speech_to_text: ^6.6.0
  url_launcher: ^6.2.6
  share_plus: ^12.0.2
  flutter_webrtc: ^0.12.1
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  device_info_plus: ^11.2.1
  package_info_plus: ^8.1.1
  livekit_client: ^2.3.0
  uuid: ^4.5.1
  flutter_local_notifications: ^18.0.1
  flutter_secure_storage: ^9.2.2
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  timezone: ^0.9.4
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.13.1
flutter_launcher_icons:
  android: true
  ios: false          # ⬅️ ajoute cette ligne
  image_path: "assets/icon/icon.png"
  # ... reste de ta config existante
  min_sdk_android: 24
flutter:
  uses-material-design: true
  assets:
    - assets/images/
